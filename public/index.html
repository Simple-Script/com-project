<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Angwardai - Work in Progress</title>
    <style>
        /* Ensure the body takes up the full viewport height */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #282c34;
            color: white;
            padding: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        header h1 {
            margin: 0;
            font-size: 3rem;
        }

        section {
            flex-grow: 1; /* Make sure this section grows to fill available space */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            text-align: center;
        }

        .hero {
            background: #333;
            color: white;
            padding: 100px 20px;
        }

        .cta-button {
            background-color: #f36f6f;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.2rem;
            display: inline-block;
            margin-top: 20px;
        }

        .cta-button:hover {
            background-color: #e64c4c;
        }

        footer {
            background-color: #282c34;
            color: white;
            text-align: center;
            padding: 20px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Angwardai</h1>
        <p>Work in Progress</p>
    </header>

    <section class="hero">
        <h2>We're Building Something Amazing!</h2>
        <p>Angwardai is still under development. Stay tuned for innovative AI-powered solutions!</p>
        <p>Check back soon for updates!</p>
    </section>

    <footer>
        <p>&copy; 2025 Angwardai. All rights reserved.</p>
    </footer>
</body>
</html>
